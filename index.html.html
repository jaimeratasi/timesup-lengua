<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Time's Up Lengua</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f2ea;margin:0;padding:20px;text-align:center}
#card{margin:20px auto;padding:30px;max-width:500px;border:2px solid #333;border-radius:12px;background:#fff;font-size:2rem;font-weight:bold;min-height:80px;display:flex;align-items:center;justify-content:center}
button{padding:12px 18px;margin:6px;font-size:16px}
#timer{font-size:2rem}
</style></head><body>
<h2>Time's Up · Lengua</h2>
<div id="timer">60</div>
<div id="card">Pulsa Barajar</div>
<button onclick="shuffleDeck()">🔀 Barajar</button>
<button onclick="startTurn()">▶️ Empezar turno</button>
<button onclick="nextCard()">✅ Acierto / ⏭ Pasar</button>
<button onclick="copyLink()">🔗 Copiar enlace</button>
<p id="info"></p>
<script>
const words=["Metáfora","Hipérbole","Sinónimo","Antónimo","Sustantivo","Adjetivo","Verbo","Adverbio","Sujeto","Predicado","Oración compuesta","Conector","Prefijo","Sufijo","Polisemia","Homófono","Tilde diacrítica","Conjunción","Preposición","Pronombre","Complemento directo","Complemento indirecto","Narrador","Personaje","Diálogo","Rima","Verso","Estrofa","Sinestesia","Personificación","Coherencia","Cohesión","Registro formal","Ambigüedad","Párrafo","Argumento"];
let deck=[],pos=0,remaining=60,int=null;
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function enc(){return btoa(unescape(encodeURIComponent(JSON.stringify({d:deck,p:pos}))))}
function dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))))}
function load(){let s=location.hash.slice(1);if(s){try{let x=dec(s);deck=x.d;pos=x.p;show()}catch(e){}}}
function updateURL(){history.replaceState({},'',location.pathname+'#'+enc())}
function show(){document.getElementById("card").textContent=pos<deck.length?deck[pos]:"FIN DEL MAZO";document.getElementById("info").textContent=`Carta ${Math.min(pos+1,deck.length)}/${deck.length}`;updateURL();}
function shuffleDeck(){deck=sh(words);pos=0;remaining=60;document.getElementById("timer").textContent=60;show();}
function startTurn(){clearInterval(int);remaining=60;document.getElementById("timer").textContent=remaining;int=setInterval(()=>{remaining--;document.getElementById("timer").textContent=remaining;if(remaining<=0){clearInterval(int);alert("Turno terminado. Copia el enlace para el siguiente jugador.");}},1000);}
function nextCard(){if(pos<deck.length-1){pos++;show();}else{pos=deck.length;show();}}
async function copyLink(){try{await navigator.clipboard.writeText(location.href);alert("Enlace copiado");}catch(e){prompt("Copia este enlace",location.href);}}
load();
</script></body></html>
